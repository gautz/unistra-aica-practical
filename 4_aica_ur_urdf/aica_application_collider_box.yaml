schema: 2-0-6
dependencies:
  core: v5.1.0
on_start:
  load:
    - component: box_collider
    - component: interactive_marker
    - component: interactive_marker_copy
components:
  box_collider:
    component: aica_core_components::utility::BoxCollider
    display_name: Box Collider
    events:
      transitions:
        on_load:
          lifecycle:
            component: box_collider
            transition: configure
        on_configure:
          lifecycle:
            component: box_collider
            transition: activate
    parameters:
      publish_marker: true
      y_size: 0.2
      z_size: 0.05
    inputs:
      target: /interactive_marker/pose
      center: /interactive_marker_copy/pose
  interactive_marker:
    component: aica_core_components::ros::InteractiveMarker
    display_name: Target Interactive Marker
    parameters:
      frame: target
      initial_pose:
        - !!float 0.0
        - !!float 1.0
        - !!float 0.0
        - !!float 1.0
        - !!float 0.0
        - !!float 0.0
        - !!float 0.0
    outputs:
      pose: /interactive_marker/pose
  interactive_marker_copy:
    component: aica_core_components::ros::InteractiveMarker
    display_name: Center Interactive Marker
    parameters:
      frame: center
      initial_pose:
        - !!float 0.0
        - !!float 0.0
        - !!float 0.0
        - !!float 1.0
        - !!float 0.0
        - !!float 0.0
        - !!float 0.0
      handle_scale: 0.01
    outputs:
      pose: /interactive_marker_copy/pose
graph:
  positions:
    components:
      box_collider:
        x: 660
        y: 60
      interactive_marker:
        x: 160
        y: 180
      interactive_marker_copy:
        x: 160
        y: 440
  edges:
    on_start_on_start_box_collider_box_collider:
      path:
        - x: 360
          y: 60
        - x: 360
          y: 120
    on_start_on_start_interactive_marker_interactive_marker:
      path:
        - x: 140
          y: 60
        - x: 140
          y: 240
    on_start_on_start_interactive_marker_copy_interactive_marker_copy:
      path:
        - x: 140
          y: 60
        - x: 140
          y: 500
    interactive_marker_pose_box_collider_target:
      path:
        - x: 580
          y: 400
        - x: 580
          y: 320
    interactive_marker_copy_pose_box_collider_center:
      path:
        - x: 620
          y: 660
        - x: 620
          y: 360